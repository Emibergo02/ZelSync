name: ZelSync
version: '${version}'
main: dev.unnm3d.zelsync.ZelSync
api-version: '1.21'
folia-supported: true
depend:
  - Vault
softdepend:
  - RedisEconomy
  - WorldGuard
  - PlayerPoints
  - Floodgate
libraries:
  - com.zaxxer:HikariCP:5.1.0
  - org.xerial:sqlite-jdbc:3.46.0.0
  - org.xerial.snappy:snappy-java:1.1.10.7
  - org.snakeyaml:snakeyaml-engine:2.7
  - org.postgresql:postgresql:42.7.10
permissions:
  zelsync.trade:
    description: Open the trade GUI
    default: true
  zelsync.ignore:
    description: Ignore a trade
    default: true
  zelsync.browse:
    description: Browse the trades
    default: false
  zelsync.setitem:
    description: Set a gui item from your hand
    default: false
  zelsync.getitem:
    description: Get a gui item to your hand
    default: false
  zelsync.inspect:
    description: Inspect a item
    default: false
  zelsync.reload:
    description: Get a gui item to your hand
    default: false
  zelsync.rate.showtrade:
    description: Show the trade
    default: true
  zelsync.rate.showplayer:
    description: Show the player
    default: true
  zelsync.rate:
    description: Rate a trade
    default: true
  zelsync.spectate:
    description: Rate a trade
    default: false
  zelsync.modify:
    description: Rate a trade
    default: false
  zelsync.stresser:
    description: Stress test the plugin
    default: false
  zelsync.usecurrency.xp:
    description: Use the xp currency
    default: true
  zelsync.usecurrency.default:
    description: Use the default currency
    default: true
  zelsync.admin:
    description: Use the default currency
    default: op
    children:
      zelsync.browse: true
      zelsync.setitem: true
      zelsync.getitem: true
      zelsync.stresser: true
      zelsync.reload: true
      zelsync.modify: true
      zelsync.spectate: true
      zelsync.inspect: true
      zelsync.usecurrency.*: true